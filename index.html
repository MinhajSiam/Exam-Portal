<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন - স্কুল পরীক্ষা পোর্টাল</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* ডার্ক থিম ব্যাকগ্রাউন্ড */
        body {
            background-color: #0f172a;
            /* Deep dark blue */
            color: #ffffff;
        }

        /* গ্লাসমরফিজম (Glassmorphism) ডিজাইন */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            /* হালকা স্বচ্ছ সাদা */
            backdrop-filter: blur(12px);
            /* পেছনের অংশ ব্লার করবে */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden font-sans">

    <!-- ব্যাকগ্রাউন্ডের সুন্দর কালার গ্লো (Glowing Orbs) -->
    <div
        class="absolute top-0 left-10 w-72 h-72 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20">
    </div>
    <div
        class="absolute bottom-0 right-10 w-72 h-72 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20">
    </div>

    <!-- মূল লগইন বক্স -->
    <div class="glass-card w-full max-w-md p-8 rounded-2xl shadow-2xl relative z-10 mx-4">

        <!-- লোগো এবং টেক্সট -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold mb-2 tracking-wide">স্বাগতম</h2>
            <p class="text-gray-400 text-sm">পোর্টালটিতে প্রবেশ করতে লগইন করুন</p>
        </div>

        <!-- ইউজার রোল সিলেক্টর (অ্যাডমিন / শিক্ষক / শিক্ষার্থী) -->
        <div class="flex justify-between bg-black/20 rounded-lg p-1 mb-8">
            <button id="btn-admin"
                class="flex-1 py-2 text-sm rounded-md bg-blue-600 text-white font-medium transition-all shadow-lg"
                onclick="changeRole('admin')">অ্যাডমিন</button>
            <button id="btn-teacher"
                class="flex-1 py-2 text-sm rounded-md text-gray-400 hover:text-white transition-all"
                onclick="changeRole('teacher')">শিক্ষক</button>
            <button id="btn-student"
                class="flex-1 py-2 text-sm rounded-md text-gray-400 hover:text-white transition-all"
                onclick="changeRole('student')">শিক্ষার্থী</button>
        </div>

        <!-- লগইন ফর্ম -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-5">
                <label id="id-label" class="block text-sm font-medium text-gray-300 mb-2">অ্যাডমিন আইডি</label>
                <input type="text" id="userId"
                    class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 focus:border-blue-500 focus:bg-white/10 focus:outline-none transition-all placeholder-gray-500"
                    placeholder="আপনার আইডি দিন" required>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-medium text-gray-300 mb-2">পিন নাম্বার (PIN)</label>
                <input type="password" id="password"
                    class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 focus:border-blue-500 focus:bg-white/10 focus:outline-none transition-all placeholder-gray-500"
                    placeholder="••••••••" required>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-lg shadow-blue-500/40">
                প্রবেশ করুন
            </button>
        </form>
    </div>

    <!-- জাভাস্ক্রিপ্ট (লজিক কন্ট্রোল) -->
    <script>
        let selectedRole = 'admin';

        // রোল পরিবর্তনের ফাংশন
        function changeRole(role) {
            selectedRole = role;

            // সব বাটনের ডিজাইন রিসেট করা
            const inactiveClass = 'flex-1 py-2 text-sm rounded-md text-gray-400 hover:text-white transition-all';
            document.getElementById('btn-admin').className = inactiveClass;
            document.getElementById('btn-teacher').className = inactiveClass;
            document.getElementById('btn-student').className = inactiveClass;

            // সিলেক্ট করা বাটনটি নীল করা
            const activeClass = 'flex-1 py-2 text-sm rounded-md bg-blue-600 text-white font-medium transition-all shadow-lg';
            document.getElementById(`btn-${role}`).className = activeClass;

            // রোল অনুযায়ী ফিল্ডের নাম পরিবর্তন করা
            const idLabel = document.getElementById('id-label');
            const idInput = document.getElementById('userId');

            if (role === 'student') {
                idLabel.innerText = 'রোল নম্বর';
                idInput.placeholder = 'আপনার ক্লাসের রোল নম্বর দিন';
            } else if (role === 'teacher') {
                idLabel.innerText = 'শিক্ষক আইডি';
                idInput.placeholder = 'আপনার শিক্ষক আইডি দিন';
            } else {
                idLabel.innerText = 'অ্যাডমিন আইডি';
                idInput.placeholder = 'আপনার অ্যাডমিন আইডি দিন';
            }
        }

        // ফর্ম সাবমিট করার ফাংশন
        function handleLogin(event) {
            event.preventDefault(); // পেজ রিলোড হওয়া বন্ধ করে

            const userId = document.getElementById('userId').value;
            const pin = document.getElementById('password').value;

            // আপাতত একটি অ্যালার্ট দিয়ে দেখাচ্ছি যে ডাটা কাজ করছে
            alert(`লগইন রিকোয়েস্ট:\nরোল: ${selectedRole}\nআইডি/রোল: ${userId}\nপিন: ${pin}\n\n(পরবর্তীতে এখানে Firebase ডাটাবেস যুক্ত করে আসল লগইন সিস্টেম চালু করা হবে)`);
        }
    </script>
</body>

</html>
