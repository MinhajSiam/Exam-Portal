<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইউজার ম্যানেজমেন্ট - স্কুল পরীক্ষা পোর্টাল</title>
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
        }

        .glass-modal {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
    </style>
</head>

<body class="h-screen flex font-sans relative">

    <!-- ব্যাকগ্রাউন্ড গ্লো -->
    <div
        class="absolute top-0 left-0 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 pointer-events-none">
    </div>

    <!-- সাইডবার (Sidebar) -->
    <aside id="sidebar" class="glass-panel w-64 h-full border-r border-white/10 flex flex-col hidden md:flex z-30">

        <div class="h-16 flex items-center justify-center border-b border-white/10 px-4">
            <i class="fa-solid fa-graduation-cap text-blue-500 text-2xl mr-3"></i>
            <h1 class="text-xl font-bold tracking-wider">এডু<span class="text-blue-500">পোর্টাল</span></h1>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-2">
            <a href="admin-dashboard.html"
                class="flex items-center px-4 py-3 text-gray-400 hover:bg-white/5 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-chart-pie w-6"></i>
                <span class="font-medium">ড্যাশবোর্ড</span>
            </a>

            <a href="user-management.html"
                class="flex items-center px-4 py-3 bg-blue-600/20 text-blue-400 border-l-4 border-blue-500 rounded-r-lg transition-colors">
                <i class="fa-solid fa-users w-6"></i>
                <span class="font-medium">ইউজার ম্যানেজমেন্ট</span>
            </a>

            <a href="#"
                class="flex items-center px-4 py-3 text-gray-400 hover:bg-white/5 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-book-open w-6"></i>
                <span class="font-medium">ক্লাস ও বিষয়</span>
            </a>

            <a href="#"
                class="flex items-center px-4 py-3 text-gray-400 hover:bg-white/5 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-file-signature w-6"></i>
                <span class="font-medium">পরীক্ষা সেটিং</span>
            </a>

            <a href="#"
                class="flex items-center px-4 py-3 text-gray-400 hover:bg-white/5 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-print w-6"></i>
                <span class="font-medium">মার্কশিট ও রিপোর্ট</span>
            </a>
        </nav>

        <div class="p-4 border-t border-white/10">
            <button
                class="w-full flex items-center justify-center px-4 py-2 bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white rounded-lg transition-all border border-red-500/20">
                <i class="fa-solid fa-right-from-bracket mr-2"></i> লগআউট
            </button>
        </div>
    </aside>

    <!-- মূল কনটেন্ট -->
    <main class="flex-1 flex flex-col h-full relative z-10 w-full">
        <!-- হেডার -->
        <header class="h-16 glass-panel border-b border-white/10 flex items-center justify-between px-6">
            <h2 class="text-lg font-medium text-gray-300">ইউজার ম্যানেজমেন্ট</h2>
            <div class="flex items-center space-x-3">
                <p class="text-sm font-bold text-white hidden sm:block">প্রধান শিক্ষক</p>
                <img src="https://ui-avatars.com/api/?name=Admin&background=2563eb&color=fff"
                    class="w-10 h-10 rounded-full border-2 border-blue-500/50">
            </div>
        </header>

        <!-- মূল বডি -->
        <div class="flex-1 overflow-y-auto p-6">

            <!-- টপ অ্যাকশন বার ও ট্যাব -->
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">

                <!-- ট্যাব (শিক্ষক / শিক্ষার্থী) -->
                <div class="flex bg-white/5 p-1 rounded-lg border border-white/10">
                    <button id="tab-teacher" onclick="switchTab('teacher')"
                        class="px-6 py-2 rounded-md bg-blue-600 text-white font-medium text-sm transition-all shadow-lg">শিক্ষক
                        তালিকা</button>
                    <button id="tab-student" onclick="switchTab('student')"
                        class="px-6 py-2 rounded-md text-gray-400 hover:text-white font-medium text-sm transition-all">শিক্ষার্থী
                        তালিকা</button>
                </div>

                <!-- সার্চ এবং অ্যাড বাটন -->
                <div class="flex gap-3 w-full md:w-auto">
                    <div class="relative flex-1 md:w-64">
                        <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400 text-sm"></i>
                        <input type="text" placeholder="নাম বা আইডি খুঁজুন..."
                            class="w-full pl-9 pr-4 py-2 bg-white/5 border border-white/10 rounded-lg focus:border-blue-500 focus:outline-none text-sm">
                    </div>
                    <button onclick="openModal()"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-lg shadow-blue-500/30 flex items-center gap-2 whitespace-nowrap">
                        <i class="fa-solid fa-plus"></i> নতুন যুক্ত করুন
                    </button>
                </div>
            </div>

            <!-- ইউজার ডাটা টেবিল (Glassmorphism) -->
            <div class="glass-panel border border-white/10 rounded-xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white/5 text-gray-300 text-sm border-b border-white/10">
                                <th class="p-4 font-medium">ছবি ও নাম</th>
                                <th class="p-4 font-medium" id="col-id">শিক্ষক আইডি</th>
                                <th class="p-4 font-medium">পিন (PIN)</th>
                                <th class="p-4 font-medium" id="col-extra">পদবি</th>
                                <th class="p-4 font-medium text-right">অ্যাকশন</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body" class="text-sm divide-y divide-white/5">
                            <!-- ডামি ডাটা (শিক্ষক) -->
                            <tr class="hover:bg-white/5 transition-colors">
                                <td class="p-4 flex items-center gap-3">
                                    <img src="https://ui-avatars.com/api/?name=Rahim&background=random"
                                        class="w-8 h-8 rounded-full">
                                    <span class="font-medium">আব্দুর রহিম</span>
                                </td>
                                <td class="p-4 text-gray-300">T-1001</td>
                                <td class="p-4 text-gray-300">••••</td>
                                <td class="p-4 text-gray-300">সিনিয়র শিক্ষক (গণিত)</td>
                                <td class="p-4 text-right space-x-2">
                                    <button class="text-blue-400 hover:text-blue-300"><i
                                            class="fa-solid fa-pen"></i></button>
                                    <button class="text-red-400 hover:text-red-300"><i
                                            class="fa-solid fa-trash"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- পপ-আপ মডাল (নতুন ইউজার যুক্ত করার ফর্ম) -->
    <div id="add-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <!-- মডাল ব্যাকগ্রাউন্ড ওভারলে -->
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>

        <!-- মডাল বক্স -->
        <div class="glass-modal border border-white/10 w-full max-w-md p-6 rounded-2xl relative z-10 shadow-2xl transform scale-95 transition-transform duration-300"
            id="modal-content">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold" id="modal-title">নতুন শিক্ষক যুক্ত করুন</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white"><i
                        class="fa-solid fa-xmark text-lg"></i></button>
            </div>

            <form onsubmit="saveUser(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-300 mb-1">সম্পূর্ণ নাম</label>
                        <input type="text"
                            class="w-full px-3 py-2 bg-white/5 border border-white/10 rounded-lg focus:border-blue-500 focus:outline-none"
                            required>
                    </div>
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label id="modal-id-label" class="block text-sm text-gray-300 mb-1">আইডি নম্বর</label>
                            <input type="text"
                                class="w-full px-3 py-2 bg-white/5 border border-white/10 rounded-lg focus:border-blue-500 focus:outline-none"
                                required>
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm text-gray-300 mb-1">লগইন পিন</label>
                            <input type="text"
                                class="w-full px-3 py-2 bg-white/5 border border-white/10 rounded-lg focus:border-blue-500 focus:outline-none"
                                required>
                        </div>
                    </div>
                    <div id="extra-field-container">
                        <label id="modal-extra-label" class="block text-sm text-gray-300 mb-1">পদবি / বিষয়</label>
                        <input type="text"
                            class="w-full px-3 py-2 bg-white/5 border border-white/10 rounded-lg focus:border-blue-500 focus:outline-none">
                    </div>
                </div>
                <div class="mt-6 flex justify-end gap-3">
                    <button type="button" onclick="closeModal()"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-white/10 hover:bg-white/20 transition-colors">বাতিল</button>
                    <button type="submit"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white shadow-lg transition-colors">সংরক্ষণ
                        করুন</button>
                </div>
            </form>
        </div>
    </div>

    <!-- জাভাস্ক্রিপ্ট -->
    <script>
        let currentTab = 'teacher'; // ডিফল্ট শিক্ষক ট্যাব

        function switchTab(tab) {
            currentTab = tab;

            // বাটন ডিজাইন আপডেট
            const activeClass = 'px-6 py-2 rounded-md bg-blue-600 text-white font-medium text-sm transition-all shadow-lg';
            const inactiveClass = 'px-6 py-2 rounded-md text-gray-400 hover:text-white font-medium text-sm transition-all';

            document.getElementById('tab-teacher').className = tab === 'teacher' ? activeClass : inactiveClass;
            document.getElementById('tab-student').className = tab === 'student' ? activeClass : inactiveClass;

            // টেবিল হেডার আপডেট
            document.getElementById('col-id').innerText = tab === 'teacher' ? 'শিক্ষক আইডি' : 'রোল নম্বর';
            document.getElementById('col-extra').innerText = tab === 'teacher' ? 'পদবি' : 'ক্লাস';

            // মডাল টেক্সট আপডেট (যাতে নতুন যুক্ত করার সময় সঠিক লেখা দেখায়)
            document.getElementById('modal-title').innerText = tab === 'teacher' ? 'নতুন শিক্ষক যুক্ত করুন' : 'নতুন শিক্ষার্থী যুক্ত করুন';
            document.getElementById('modal-id-label').innerText = tab === 'teacher' ? 'শিক্ষক আইডি' : 'রোল নম্বর';
            document.getElementById('modal-extra-label').innerText = tab === 'teacher' ? 'পদবি / বিষয়' : 'শ্রেণি / ক্লাস';

            // (পরবর্তীতে এখানে Firebase থেকে ডাটা এনে টেবিল আপডেট করা হবে)
        }

        // মডাল ওপেন এবং ক্লোজ করা
        const modal = document.getElementById('add-modal');
        const modalContent = document.getElementById('modal-content');

        function openModal() {
            modal.classList.remove('hidden');
            setTimeout(() => modalContent.classList.remove('scale-95'), 10); // স্মুথ পপ-আপ অ্যানিমেশন
        }

        function closeModal() {
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        function saveUser(event) {
            event.preventDefault();
            alert("ডাটা সংরক্ষণ করা হয়েছে! (এটি পরবর্তীতে ডাটাবেসে যাবে)");
            closeModal();
        }
    </script>
</body>

</html>
